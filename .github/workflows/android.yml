name: Android Debug APK Build

on:
  push:
    branches: [ master ] # Change to master if needed

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Change to your project's Java version
      - name: Make Gradlew Executable
        run: chmod +x gradlew
      - name: Build Debug APK
        run: ./gradlew assembleDebug -PPARENT_APP_API_URL=https://mis-parent-app-production.up.railway.app/
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
